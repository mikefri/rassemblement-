<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Déclaration d'anomalie – Rassemblement kit</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    h1 {
      color: #2c3e50;
    }
    select, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      font-size: 16px;
    }
    .step {
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<h1>Déclaration d’anomalie</h1>

<div id="form"></div>

<button onclick="submitAnomaly()">✅ Enregistrer l’anomalie</button>

<script>
/* ==========================
   🔥 CONFIG FIREBASE
   ========================== */
const firebaseConfig = {
  apiKey: "REMPLACER",
  authDomain: "REMPLACER",
  projectId: "REMPLACER",
  storageBucket: "REMPLACER",
  messagingSenderId: "REMPLACER",
  appId: "REMPLACER"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ==========================
   🌳 ARBORESCENCE ANOMALIES
   ========================== */
const tree = {
  label: "Type d’anomalie",
  children: [
    {
      label: "Contenant",
      children: [
        {
          label: "Support / kit / engin",
          children: [
            {
              label: "Logique / Physique",
              children: [
                {
                  label: "Type de contenant non adapté",
                  children: [
                    { label: "Trop grand" },
                    { label: "Trop petit" }
                  ]
                },
                {
                  label: "Contenant HS",
                  children: [
                    { label: "Bois" },
                    { label: "Fer" }
                  ]
                }
              ]
            }
          ]
        }
      ]
    },
    {
      label: "Flux",
      children: [
        { label: "Appro manquant" },
        { label: "Blocage en entrée MAG2EPRE" },
        { label: "Blocage en sortie MAG2SPRE" }
      ]
    },
    {
      label: "Logiciel",
      children: [
        { label: "Déclenchement de mouvement HS" }
      ]
    }
  ]
};

let selections = [];
const formDiv = document.getElementById("form");

/* ==========================
   📐 GÉNÉRATION DYNAMIQUE
   ========================== */
function renderStep(node, level = 0) {
  // Supprimer les niveaux suivants
  document.querySelectorAll(`[data-level]`).forEach(el => {
    if (parseInt(el.dataset.level) >= level) el.remove();
  });
  selections = selections.slice(0, level);

  if (!node.children) return;

  const div = document.createElement("div");
  div.className = "step";
  div.dataset.level = level;

  const select = document.createElement("select");
  select.innerHTML = `<option value="">-- ${node.label} --</option>`;

  node.children.forEach(child => {
    const opt = document.createElement("option");
    opt.value = child.label;
    opt.textContent = child.label;
    select.appendChild(opt);
  });

  select.onchange = () => {
    const selected = node.children.find(c => c.label === select.value);
    selections[level] = select.value;
    if (selected) renderStep(selected, level + 1);
  };

  div.appendChild(select);
  formDiv.appendChild(div);
}

/* ==========================
   📝 COMMENTAIRE FINAL
   ========================== */
function addComment() {
  const div = document.createElement("div");
  div.dataset.level = 999;
  div.innerHTML = `
    <textarea id="comment" rows="4" placeholder="Commentaire libre (optionnel)"></textarea>
  `;
  formDiv.appendChild(div);
}

/* ==========================
   💾 ENREGISTREMENT FIREBASE
   ========================== */
function submitAnomaly() {
  const comment = document.getElementById("comment")?.value || "";

  db.collection("anomalies").add({
    chemin: selections,
    commentaire: comment,
    date: new Date().toISOString()
  })
  .then(() => {
    alert("✅ Anomalie enregistrée");
    location.reload();
  })
  .catch(err => alert("❌ Erreur : " + err));
}

/* INIT */
renderStep(tree);
addComment();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Déclaration d'anomalie – Rassemblement kit</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#e8600a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Anomalies Kit">
  <link rel="apple-touch-icon" href="./icons/icon-152x152.png">
  <link rel="icon" type="image/x-icon" href="./icons/favicon.ico">

  <!-- Feuille de style externe -->
  <link rel="stylesheet" href="./style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <!-- Export Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- ══════════════════════════════════════════
       LOGIN
  ══════════════════════════════════════════ -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">⚠</div>
      <h1>Déclaration d'anomalie</h1>
      <p class="login-subtitle">Rassemblement de kit · Connexion requise</p>
      <div class="login-error" id="login-error"></div>
      <div class="login-field">
        <label>Adresse e-mail</label>
        <input type="email" id="login-email"
               placeholder="prenom.nom@entreprise.fr"
               autocomplete="username" />
      </div>
      <div class="login-field">
        <label>Mot de passe</label>
        <input type="password" id="login-password"
               placeholder="••••••••"
               autocomplete="current-password" />
      </div>
      <button class="btn-login" id="login-btn" onclick="doLogin()">
        Se connecter
      </button>
    </div>
    <p class="login-footer">Accès réservé au personnel autorisé</p>
  </div>

  <!-- ══════════════════════════════════════════
       APPLICATION
  ══════════════════════════════════════════ -->
  <div id="app-view">

    <header>
      <div class="logo">
        <img src="./icons/icon-32x32.png" alt="Logo" style="width:24px;height:24px;">
      </div>
      <div class="header-titles">
        <h1>Déclaration d'anomalie</h1>
        <p>Rassemblement de kit <span class="version-badge">v…</span></p>
      </div>
      <div class="header-right">
        <div class="user-chip" id="user-chip">
          <div class="user-avatar" id="user-avatar">?</div>
          <span class="user-email" id="user-email-display">—</span>
        </div>
        <button class="btn-header" onclick="toggleHistory()">📋 Historique</button>
        <button class="btn-header" onclick="doLogout()">🔓 Déco.</button>
      </div>
    </header>

    <div class="container">

      <!-- Formulaire -->
      <div id="form-view">
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progress-bar" style="width:0%"></div>
          </div>
          <div class="progress-label" id="progress-label">Étape 1</div>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div id="step-container"></div>
      </div>

      <!-- Historique -->
      <div class="history-wrap" id="history-view">
        <div class="filter-bar">
          <div class="filter-bar-top">
            <span class="filter-title">🔍 Filtres</span>
            <span class="filter-count" id="filter-count">— entrées</span>
            <button class="btn-clear-filters" onclick="clearFilters()">✕ Réinitialiser</button>
          </div>
          <div class="filter-row">
            <div class="filter-input-wrap">
              <span class="filter-icon">🔍</span>
              <input class="filter-input" id="f-search" type="text"
                     placeholder="Recherche libre…" oninput="applyFilters()" />
            </div>
            <div class="filter-input-wrap">
              <span class="filter-icon">🏷</span>
              <select class="filter-input" id="f-categorie" onchange="applyFilters()">
                <option value="">Toutes catégories</option>
              </select>
            </div>
          </div>
          <div class="filter-row three">
            <div class="filter-input-wrap">
              <input class="filter-input" id="f-date-from" type="date"
                     title="Du" onchange="applyFilters()" />
            </div>
            <div class="filter-input-wrap">
              <input class="filter-input" id="f-date-to" type="date"
                     title="Au" onchange="applyFilters()" />
            </div>
            <div class="filter-input-wrap">
              <span class="filter-icon">👤</span>
              <input class="filter-input" id="f-declarant" type="text"
                     placeholder="Déclarant…" oninput="applyFilters()" />
            </div>
          </div>
        </div>

        <div class="card" style="padding:0;overflow:hidden;border:none;background:transparent;box-shadow:none;">
          <div id="history-list"></div>
        </div>

        <div class="btn-row" style="flex-wrap:wrap;gap:8px;">
          <button class="btn btn-next" onclick="toggleHistory()"
                  style="flex:1;min-width:160px">← Nouvelle déclaration</button>
          <button class="btn btn-back" onclick="exportCSV()"
                  style="flex:0 0 auto;background:#1d6f42;color:#fff;border:none;">⬇ CSV</button>
          <button class="btn btn-back" onclick="exportXLSX()"
                  style="flex:0 0 auto;background:#217346;color:#fff;border:none;">⬇ Excel</button>
        </div>
      </div>

    </div><!-- /container -->
  </div><!-- /app-view -->

  <!-- Input photo (caché, important pour mobile) -->
  <input type="file" id="photo-input" accept="image/*" multiple
         style="position:fixed;opacity:0;width:1px;height:1px;top:-200px;left:-200px;pointer-events:none;"
         onchange="handlePhotoInput(event)" />

  <!-- Lightbox -->
  <div id="lightbox" onclick="handleLightboxClick(event)">
    <button id="lightbox-close" onclick="closeLightbox()">✕</button>
    <button id="lightbox-prev" onclick="lightboxNav(-1)">‹</button>
    <img id="lightbox-img" src="" alt="Photo anomalie" />
    <button id="lightbox-next" onclick="lightboxNav(+1)">›</button>
    <div id="lightbox-counter"></div>
  </div>

  <!-- Modal suppression -->
  <div id="confirm-overlay">
    <div id="confirm-box">
      <div class="confirm-icon">🗑️</div>
      <h3>Supprimer l'anomalie ?</h3>
      <p>Cette action est irréversible.<br>L'anomalie sera définitivement supprimée.</p>
      <div class="confirm-btns">
        <button class="btn-confirm-cancel" onclick="closeConfirm()">Annuler</button>
        <button class="btn-confirm-delete" id="confirm-ok-btn">Supprimer</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Script applicatif externe -->
  <script src="./app.js"></script>

</body>
</html>
